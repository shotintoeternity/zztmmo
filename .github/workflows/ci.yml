name: CI

on:
  push:
  pull_request:

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # go-version is pinned here, NOT read from go.mod: engine/go.mod says
      # `go 1.16`, which is the language floor go:embed required, not the
      # toolchain. The baseline was verified on go1.26.5 (TASKS.md line 14).
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: engine/go.sum
      - run: go build ./...
        working-directory: engine
      - run: go vet ./...
        working-directory: engine
      - run: go test ./...
        working-directory: engine

  engine-race:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Required job: the default-instance room-lifecycle race is fixed (M13.4,
    # NOTES.md 2026-07-12). The whole world ticks through one lock per instance,
    # so `go test -race ./...` must stay green.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: engine/go.sum
      - run: go test -race ./...
        working-directory: engine

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: engine/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: engine/web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
